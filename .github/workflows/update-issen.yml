name: Update issen formula

on:
  repository_dispatch:
    types: [update-issen]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (e.g., v0.1.0 or 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Set version from event
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            RAW="${{ github.event.client_payload.version }}"
          else
            RAW="${{ inputs.version }}"
          fi
          # Strip leading 'v' if present (tags are v0.1.0, formula wants 0.1.0)
          VERSION="${RAW#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download checksums from release
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          echo "Downloading checksums for v${VERSION}..."
          gh release download "v${VERSION}" \
            --repo SecurityRonin/issen \
            --pattern "checksums.txt"
          cat checksums.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract SHA256 checksums
        id: checksums
        run: |
          extract_sha() {
            grep "$1" checksums.txt | awk '{print $1}'
          }

          VERSION="${{ steps.get-version.outputs.version }}"
          echo "arm64_macos_sha=$(extract_sha "issen-${VERSION}-aarch64-apple-darwin.tar.gz")" >> $GITHUB_OUTPUT
          echo "x86_64_macos_sha=$(extract_sha "issen-${VERSION}-x86_64-apple-darwin.tar.gz")" >> $GITHUB_OUTPUT

      - name: Update Formula
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          ARM64_MACOS="${{ steps.checksums.outputs.arm64_macos_sha }}"
          X86_64_MACOS="${{ steps.checksums.outputs.x86_64_macos_sha }}"

          cat > Formula/issen.rb << FORMULA
          class Issen < Formula
            desc "Forensic super-timeline engine correlating disk and memory evidence"
            homepage "https://github.com/SecurityRonin/issen"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/SecurityRonin/issen/releases/download/v${VERSION}/issen-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_MACOS}"
              else
                url "https://github.com/SecurityRonin/issen/releases/download/v${VERSION}/issen-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_MACOS}"
              end
            end

            def install
              bin.install "issen"
            end

            test do
              assert_match "issen #{version}", shell_output("#{bin}/issen --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/issen.rb

      - name: Commit and push
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/issen.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "issen: update to v${VERSION}"
          git push
